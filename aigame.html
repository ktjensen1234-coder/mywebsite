<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/aigamestyle.css">
</head>
<body>
    <div class="game-container">
    <h2>Catch the Box! You have 10 Seconds!</h2>
    <p>Score: <span id="score">0</span></p>

    <div id="game-area">
        <div id="box"></div>
    </div>
</div>
<script>
let score = 0;
const box = document.getElementById("box");
const scoreDisplay = document.getElementById("score");
const gameArea = document.getElementById("game-area");

function moveBox() {
    const maxX = gameArea.clientWidth - box.clientWidth;
    const maxY = gameArea.clientHeight - box.clientHeight;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    box.style.left = x + "px";
    box.style.top = y + "px";
}
box.onclick = function () {
    score++;
    scoreDisplay.textContent = score;
    moveBox();

    const colors = ["red", "blue", "green", "purple", "orange", "pink", "black"];

    const randomColor = colors[Math.floor(Math.random() * colors.length)];
    box.style.backgroundColor = randomColor;
};
moveBox();
setTimeout(() => {
    alert("Game Over! Your score: " + score);
}, 10000);
</script>
</body>
</html>
